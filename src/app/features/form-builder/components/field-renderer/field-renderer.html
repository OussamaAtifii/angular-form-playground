<div class="bg-surface p-6 rounded-md shadow-md">
  <div class="flex justify-between items-center mb-3">
    <p class="uppercase text-text-base text-xs font-semibold tracking-wide">{{ field().label }}</p>
    <p class="uppercase text-text-subtle text-xs font-semibold tracking-wider">
      TYPE: {{ fieldType() }}
    </p>
  </div>
  @if (textField()) {
    <app-text-field [field]="textField()!" [control]="control()" />
  }
</div>
