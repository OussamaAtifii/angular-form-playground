<div class="relative">
  <div
    class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-text-muted"
  >
    <app-field-icon [type]="field().inputType" iconClass="size-4.5" />
  </div>
  <input
    [type]="field().inputType"
    [id]="field().id"
    [formControl]="control()"
    class="bg-surface-muted border border-border-strong rounded-md text-sm text-text-base focus:ring-3 focus:ring-accent focus:border-accent block w-full ps-9 px-2.5 py-2 shadow-xs placeholder:text-text-subtle"
    [placeholder]="placeholder()"
  />
</div>
