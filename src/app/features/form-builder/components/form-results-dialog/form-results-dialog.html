<app-dialog title="form_results">
  <div class="flex flex-col gap-8">
    @for (result of formData() | keyvalue; track $index) {
      <div class="space-y-1">
        <p class="uppercase text-text-muted text-xs font-medium">{{ result.key }}</p>
        <p class="text-text-base text-sm font-medium">{{ result.value }}</p>
      </div>
    }
  </div>
</app-dialog>
