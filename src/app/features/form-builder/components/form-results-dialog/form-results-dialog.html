<app-dialog [title]="'form_results'">
  <div class="flex flex-col gap-6">
    <div class="flex flex-col gap-4">
      @for (result of formData() | keyvalue; track $index; let last = $last) {
        <div class="min-w-0">
          <p class="uppercase text-text-muted text-xs font-medium">
            {{ fieldsLabelMap().get(result.key) }}
          </p>
          <p
            class="wrap-break-word"
            [ngClass]="
              result.value
                ? 'text-text-base text-sm font-medium tracking-wide'
                : 'text-text-subtle text-sm font-normal italic tracking-wide'
            "
          >
            {{ result.value || 'This field has no value' }}
          </p>
        </div>
        <hr class="border-t border-border" />
      }
    </div>
    <button
      (click)="close()"
      class="w-full flex items-center justify-center gap-2 uppercase py-3.5 bg-accent rounded-md mt-6 text-white text-sm font-bold hover:cursor-pointer hover:bg-accent-hover transition-colors duration-200 disabled:bg-accent-disabled disabled:text-accent-disabled-text disabled:cursor-not-allowed racking-[0.15em]"
    >
      <app-arrow-left />
      back_to_editor
    </button>
  </div>
</app-dialog>
