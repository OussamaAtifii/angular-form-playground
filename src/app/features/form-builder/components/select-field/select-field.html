<div class="relative">
  <div
    class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-text-muted"
  >
    <app-list-icon />
  </div>

  <div
    class="absolute inset-y-0 inset-e-0 flex items-center pe-3 pointer-events-none text-text-muted"
  >
    <app-chevron-down-icon />
  </div>
  <select
    [id]="field().id"
    [formControl]="control()"
    [class.text-text-subtle]="!control().value"
    [class.text-text-base]="control().value"
    class="bg-surface-muted border border-border-strong rounded-md text-sm focus:ring-accent focus:border-accent block w-full ps-9 px-2.5 py-2 shadow-xs appearance-none"
  >
    <option value="" disabled selected class="text-text-subtle">{{ field().placeholder }}</option>
    @for (option of field().options; track $index) {
      <option [value]="option" class="text-text-base">{{ option }}</option>
    }
  </select>
</div>
